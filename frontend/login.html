<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Prashikshan</title>
    <meta name="description" content="Login to your Prashikshan account to access skill assessments and placement opportunities.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <section class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 80px;">
        <div class="container">
            <div class="form-custom fade-in">
                <div class="text-center mb-4">
                    <h2 style="background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome Back</h2>
                    <p class="text-muted">Sign in to continue your journey</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--dark-surface); border-color: var(--glass-border); color: var(--text-muted);"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--dark-surface); border-color: var(--glass-border); color: var(--text-muted);"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-custom w-100 mb-3" id="loginBtn">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>

                    <p class="text-center text-muted small">
                        Don't have an account? <a href="/register.html">Register here</a>
                    </p>
                </form>

                <hr class="border-secondary my-3">
                <div class="text-center">
                    <p class="text-muted small mb-2">Demo Credentials:</p>
                    <div class="d-flex gap-2 justify-content-center flex-wrap">
                        <button class="btn btn-sm btn-outline-primary" onclick="fillDemo('aarav@student.com')">Student</button>
                        <button class="btn btn-sm btn-outline-success" onclick="fillDemo('admin@iitb.edu')">Institute</button>
                        <button class="btn btn-sm btn-outline-warning" onclick="fillDemo('hr@tcs.com')">Industry</button>
                    </div>
                    <p class="text-muted small mt-1">Password: password123</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        renderNavbar('login');

        // Redirect if already logged in
        if (isLoggedIn()) {
            const user = getUser();
            window.location.href = `/${user.role}/dashboard.html`;
        }

        function fillDemo(email) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = 'password123';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div>Signing in...';

            try {
                const data = await apiPost('/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                });

                setToken(data.token);
                setUser(data.user);
                showToast('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = `/${data.user.role}/dashboard.html`;
                }, 500);
            } catch (err) {
                showToast(err.message || 'Login failed', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
            }
        });
    </script>
</body>
</html>
